<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Comfortaa:wght@300..700&family=DM+Serif+Display:ital@0;1&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <style>
        *{
            font-family: "Nunito", sans-serif;
        }
        body{
            background-image: url(/vegfoodbg.jpg);
            background-size: cover;
            background-repeat: no-repeat;
        }
        .container{
            background-color: white;
            height: 600px;
            width: 450px;
            margin-left: 50px;
            margin-top: 50px;
            margin-bottom: 50px;
            text-align: center;
            border-radius: 20px;
        }
        .logo{
            font-size: 36px;
            position: relative;
            top: 40px;
            color: rgb(255, 89, 0); 
        }
        .us{
            position: relative;
            right: 136px;
            font-size: 14px;
            color:rgba(0, 0, 0, 0.753); ;
        }
        input{
            border-color: rgba(0, 0, 0, 0.107);
            border-radius: 20px;
            height: 30px;
            width: 320px;
        }
        input>::placeholder{
            color: rgba(0, 0, 0, 0.082);
        }
        .pw{
             position: relative;
            right: 111px;
            font-size: 14px;
            color: rgb(255, 89, 0); 
        }
        .a{
            color: white;
            background-color: rgb(255, 89, 0);
        }
    </style>

</head>
<body>
    <form class="container">
        <div class="logo"><i class="fa-solid fa-burger"></i></div><br><br><br><br>
        <h2>Login Form</h2>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicig elit. Provident, eum.</p>
        <div class="us">username</div>
        <input type="username" placeholder="enter username"><br><br>
        <div class="us">password</div>
        <input type="password"  placeholder="enter password">
        <p class="pw"><b>Forgot password?</b></p>
        <input class="a"  type="button" value="Running Order"><br><br><br><br><br>
        <div>End user agreement</div>

    </form>

</body>
</html>
